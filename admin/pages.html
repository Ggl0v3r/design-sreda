<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страницы — Админ-панель</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Дизайн среда</h2>
      <p>Админ-панель</p>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Дашборд
      </a>
      <a href="/admin/pages.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Страницы
      </a>
      <a href="/admin/works.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Галерея работ
      </a>
      <a href="/admin/calculator.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
        Калькулятор
      </a>
      <a href="/admin/uploads.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Загрузки
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank">Открыть сайт ↗</a><br><br>
      <a href="#" id="logoutBtn">Выйти</a>
    </div>
  </aside>

  <main class="main">
    <a href="/admin/" class="back-link">← Назад к дашборду</a>
    <div class="header">
      <div>
        <h1>Страницы</h1>
        <p>Редактирование контента всех страниц сайта</p>
      </div>
    </div>

    <div id="pageList"></div>

    <div id="editor" style="display:none;">
      <a href="#" class="back-link" id="backToList">← К списку страниц</a>
      <div class="card">
        <h3 id="editorTitle"></h3>
        <form id="editorForm">
          <div id="editorFields"></div>
          <div class="btn-group">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <button type="button" class="btn btn-ghost" id="cancelBtn">Отмена</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const PAGE_LABELS = {
  index: 'Главная страница',
  about: 'Студия',
  process: 'Процесс работы',
  contacts: 'Контакты',
  works_page: 'Работы (герой)',
  calculator_page: 'Калькулятор (герой)',
  footer: 'Футер'
};

let allContent = {};

async function checkAuth() {
  const res = await fetch('/api/check-auth');
  const data = await res.json();
  if (!data.authenticated) window.location.href = '/admin/login.html';
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function renderPageList() {
  document.getElementById('pageList').style.display = 'block';
  document.getElementById('editor').style.display = 'none';

  const pages = Object.keys(allContent).filter(k => k !== 'footer');
  let html = '<div class="stats-grid">';
  pages.forEach(key => {
    const label = PAGE_LABELS[key] || key;
    const sections = Object.keys(allContent[key] || {}).length;
    html += `
      <div class="stat-card" style="cursor:pointer;text-align:left;padding:24px;" onclick="editPage('${key}')">
        <h4 style="font-family:'Space Grotesk',sans-serif;font-size:1.05rem;margin-bottom:6px;">${label}</h4>
        <p style="font-size:.82rem;color:var(--muted);">${sections} ${sections === 1 ? 'секция' : 'секций'}</p>
      </div>
    `;
  });
  html += '</div>';
  document.getElementById('pageList').innerHTML = html;
}

function buildFields(obj, prefix = '') {
  let html = '';
  for (const [key, val] of Object.entries(obj)) {
    const fieldId = prefix ? `${prefix}.${key}` : key;
    if (typeof val === 'string') {
      const isMultiline = val.length > 80 || val.includes('\n');
      if (isMultiline) {
        html += `<div class="form-group"><label>${key}</label><textarea data-path="${fieldId}">${escapeHtml(val)}</textarea></div>`;
      } else {
        html += `<div class="form-group"><label>${key}</label><input type="text" data-path="${fieldId}" value="${escapeAttr(val)}"></div>`;
      }
    } else if (typeof val === 'number') {
      html += `<div class="form-group"><label>${key}</label><input type="number" step="any" data-path="${fieldId}" value="${val}"></div>`;
    } else if (typeof val === 'boolean') {
      html += `<div class="form-group"><label><input type="checkbox" data-path="${fieldId}" ${val ? 'checked' : ''}> ${key}</label></div>`;
    } else if (Array.isArray(val)) {
      html += `<div class="form-group"><label>${key} (массив — JSON)</label><textarea data-path="${fieldId}" rows="6">${escapeHtml(JSON.stringify(val, null, 2))}</textarea></div>`;
    } else if (typeof val === 'object' && val !== null) {
      html += `<h4 style="margin-top:20px;margin-bottom:12px;text-transform:capitalize;">${key}</h4>`;
      html += buildFields(val, fieldId);
    }
  }
  return html;
}

function setNestedValue(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    if (!(parts[i] in cur)) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  const last = parts[parts.length - 1];
  if (typeof cur[last] === 'number') {
    cur[last] = Number(value);
  } else if (typeof cur[last] === 'boolean') {
    cur[last] = value;
  } else if (Array.isArray(cur[last])) {
    try { cur[last] = JSON.parse(value); } catch(e) { cur[last] = value; }
  } else {
    cur[last] = value;
  }
}

window.editPage = function(pageKey) {
  const pageData = allContent[pageKey];
  document.getElementById('pageList').style.display = 'none';
  document.getElementById('editor').style.display = 'block';
  document.getElementById('editorTitle').textContent = PAGE_LABELS[pageKey] || pageKey;
  document.getElementById('editorFields').innerHTML = buildFields(pageData);
  document.getElementById('editorForm').dataset.page = pageKey;
};

document.getElementById('backToList').addEventListener('click', (e) => {
  e.preventDefault();
  renderPageList();
});

document.getElementById('cancelBtn').addEventListener('click', () => {
  renderPageList();
});

document.getElementById('editorForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pageKey = e.target.dataset.page;
  const data = JSON.parse(JSON.stringify(allContent[pageKey]));

  e.target.querySelectorAll('[data-path]').forEach(el => {
    const path = el.dataset.path;
    const value = el.type === 'checkbox' ? el.checked : el.value;
    setNestedValue(data, path, value);
  });

  allContent[pageKey] = data;

  try {
    const res = await fetch('/api/content', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(allContent)
    });
    if (res.ok) {
      showToast('Страница сохранена');
      renderPageList();
    } else {
      showToast('Ошибка сохранения', 'error');
    }
  } catch (err) {
    showToast('Ошибка сети', 'error');
  }
});

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/admin/login.html';
});

async function init() {
  await checkAuth();
  const res = await fetch('/api/content');
  allContent = await res.json();
  renderPageList();
}
init();
</script>
</body>
</html>
