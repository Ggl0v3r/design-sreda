<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель — Дизайн среда</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/styles.css">
</head>
<body>
<div class="mobile-topbar">
  <h2>Дизайн среда</h2>
  <div class="mobile-topbar-btns">
    <a href="/" target="_blank">Сайт</a>
    <button id="logoutBtnMob">Выйти</button>
  </div>
</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Дизайн среда</h2>
      <p>Админ-панель</p>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Дашборд
      </a>
      <a href="/admin/pages.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Страницы
      </a>
      <a href="/admin/works.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Галерея работ
      </a>
      <a href="/admin/calculator.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
        Калькулятор
      </a>
      <a href="/admin/uploads.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Загрузки
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank">Открыть сайт ↗</a>
      <br><br>
      <a href="#" id="logoutBtn">Выйти</a>
    </div>
  </aside>

  <main class="main">
    <div class="header">
      <div>
        <h1>Дашборд</h1>
        <p>Обзор контента сайта</p>
      </div>
      <button class="btn btn-ghost" id="refreshBtn">Обновить</button>
    </div>

    <div class="stats-grid" id="stats"></div>

    <div class="card">
      <h3>Быстрые действия</h3>
      <div class="btn-group">
        <a href="/admin/pages.html" class="btn btn-primary">Редактировать страницы</a>
        <a href="/admin/works.html" class="btn btn-secondary">Управление галереей</a>
        <a href="/admin/calculator.html" class="btn btn-secondary">Настройки калькулятора</a>
        <a href="/admin/uploads.html" class="btn btn-ghost">Загрузить файлы</a>
      </div>
    </div>

    <div class="card">
      <h3>Последние работы</h3>
      <div id="recentWorks"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
async function checkAuth() {
  const res = await fetch('/api/check-auth');
  const data = await res.json();
  if (!data.authenticated) window.location.href = '/admin/login.html';
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function loadDashboard() {
  try {
    const [contentRes, worksRes] = await Promise.all([
      fetch('/api/content'),
      fetch('/api/works')
    ]);
    const content = await contentRes.json();
    const works = await worksRes.json();

    const pageCount = Object.keys(content).filter(k => k !== 'footer').length;
    const workCount = works.works.length;
    const totalImages = works.works.reduce((sum, w) => sum + (w.images ? w.images.length : 0), 0);

    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="number">${pageCount}</div><div class="label">Страниц</div></div>
      <div class="stat-card"><div class="number">${workCount}</div><div class="label">Работ в портфолио</div></div>
      <div class="stat-card"><div class="number">${totalImages}</div><div class="label">Фотографий</div></div>
    `;

    const recent = works.works.slice(-3).reverse();
    document.getElementById('recentWorks').innerHTML = recent.map(w => `
      <div class="work-card">
        <div class="preview">
          <img src="${w.images && w.images[0] ? w.images[0] : ''}" alt="${w.title}">
        </div>
        <div class="info">
          <h4>${w.title}</h4>
          <p>${w.tag} — ${w.description}</p>
        </div>
        <div class="actions">
          <a href="/admin/works.html?edit=${w.id}" class="btn btn-sm btn-ghost">Редактировать</a>
        </div>
      </div>
    `).join('');
  } catch (err) {
    showToast('Ошибка загрузки данных', 'error');
  }
}

document.getElementById('refreshBtn').addEventListener('click', loadDashboard);

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/admin/login.html';
});
document.getElementById('logoutBtnMob').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/admin/login.html';
});

checkAuth();
loadDashboard();
</script>
</body>
</html>
