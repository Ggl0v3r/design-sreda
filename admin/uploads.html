<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Загрузки — Админ-панель</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/styles.css">
</head>
<body>
<div class="mobile-topbar">
  <h2>Загрузки</h2>
  <div class="mobile-topbar-btns">
    <a href="/admin/">Назад</a>
    <button id="logoutBtnMob">Выйти</button>
  </div>
</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Дизайн среда</h2>
      <p>Админ-панель</p>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Дашборд
      </a>
      <a href="/admin/pages.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Страницы
      </a>
      <a href="/admin/works.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Галерея работ
      </a>
      <a href="/admin/calculator.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
        Калькулятор
      </a>
      <a href="/admin/uploads.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Загрузки
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank">Открыть сайт ↗</a><br><br>
      <a href="#" id="logoutBtn">Выйти</a>
    </div>
  </aside>

  <main class="main">
    <a href="/admin/" class="back-link">← Назад к дашборду</a>
    <div class="header">
      <div>
        <h1>Загрузки</h1>
        <p>Загрузка и управление файлами изображений</p>
      </div>
    </div>

    <div class="card">
      <h3>Загрузить файл</h3>
      <div class="upload-zone" id="dropZone">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Перетащите файлы сюда или нажмите для выбора</p>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none;">
      </div>
      <div id="uploadProgress" style="margin-top:16px;"></div>
    </div>

    <div class="card">
      <h3>Загруженные файлы <span id="fileCount" style="color:var(--muted);font-weight:400;font-size:.9rem;"></span></h3>
      <div id="filesList"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
async function checkAuth() {
  const res = await fetch('/api/check-auth');
  const data = await res.json();
  if (!data.authenticated) window.location.href = '/admin/login.html';
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function loadFiles() {
  const res = await fetch('/api/uploads');
  const files = await res.json();
  document.getElementById('fileCount').textContent = `(${files.length})`;

  if (files.length === 0) {
    document.getElementById('filesList').innerHTML = '<p style="color:var(--muted);">Нет загруженных файлов</p>';
    return;
  }

  document.getElementById('filesList').innerHTML = '<div class="image-grid">' + files.map(f => `
    <div class="img-item" title="${f.name}">
      <img src="${f.url}" alt="${f.name}">
      <button class="remove" onclick="copyUrl('${f.url}')">URL</button>
    </div>
  `).join('') + '</div>';
}

window.copyUrl = function(url) {
  navigator.clipboard.writeText(url).then(() => {
    showToast('URL скопирован');
  }).catch(() => {
    const input = document.createElement('input');
    input.value = url;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    showToast('URL скопирован');
  });
};

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

async function handleFiles(files) {
  const progress = document.getElementById('uploadProgress');
  for (const file of files) {
    const formData = new FormData();
    formData.append('file', file);

    progress.innerHTML = `<p style="color:var(--muted);font-size:.85rem;">Загрузка ${file.name}...</p>`;

    try {
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      if (res.ok) {
        showToast(`Файл ${file.name} загружен`);
      } else {
        showToast(`Ошибка загрузки ${file.name}`, 'error');
      }
    } catch (err) {
      showToast(`Ошибка загрузки ${file.name}`, 'error');
    }
  }
  progress.innerHTML = '';
  fileInput.value = '';
  loadFiles();
}

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/admin/login.html';
});
document.getElementById('logoutBtnMob').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/admin/login.html';
});

async function init() {
  await checkAuth();
  await loadFiles();
}
init();
</script>
</body>
</html>
