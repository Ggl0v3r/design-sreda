<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Галерея работ — Админ-панель</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Дизайн среда</h2>
      <p>Админ-панель</p>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Дашборд
      </a>
      <a href="/admin/pages.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Страницы
      </a>
      <a href="/admin/works.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Галерея работ
      </a>
      <a href="/admin/calculator.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
        Калькулятор
      </a>
      <a href="/admin/uploads.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Загрузки
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank">Открыть сайт ↗</a><br><br>
      <a href="#" id="logoutBtn">Выйти</a>
    </div>
  </aside>

  <main class="main">
    <a href="/admin/" class="back-link">← Назад к дашборду</a>
    <div class="header">
      <div>
        <h1>Галерея работ</h1>
        <p>Добавление, редактирование и удаление проектов</p>
      </div>
      <button class="btn btn-primary" id="addWorkBtn">+ Новая работа</button>
    </div>

    <div id="worksList"></div>

    <div id="editor" style="display:none;">
      <a href="#" class="back-link" id="backToList">← К списку работ</a>
      <div class="card">
        <h3 id="editorTitle">Новая работа</h3>
        <form id="editorForm">
          <input type="hidden" id="workId">
          <div class="form-group">
            <label>Название</label>
            <input type="text" id="workTitle" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Тег / категория</label>
              <input type="text" id="workTag" placeholder="Квартира в Уфе">
            </div>
          </div>
          <div class="form-group">
            <label>Описание</label>
            <textarea id="workDesc"></textarea>
          </div>
          <div class="form-group">
            <label>Изображения (URL)</label>
            <div id="imageList"></div>
            <div style="display:flex;gap:8px;margin-top:10px;">
              <input type="text" id="newImageUrl" placeholder="URL изображения" style="flex:1;">
              <button type="button" class="btn btn-sm btn-ghost" id="addImageBtn">Добавить</button>
            </div>
            <p style="font-size:.8rem;color:var(--muted);margin-top:6px;">Загрузите файлы на странице «Загрузки» и скопируйте URL</p>
          </div>
          <div class="btn-group">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <button type="button" class="btn btn-ghost" id="cancelBtn">Отмена</button>
            <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none;">Удалить</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let works = [];
let editingImages = [];

async function checkAuth() {
  const res = await fetch('/api/check-auth');
  const data = await res.json();
  if (!data.authenticated) window.location.href = '/admin/login.html';
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function loadWorks() {
  const res = await fetch('/api/works');
  const data = await res.json();
  works = data.works;
  renderWorksList();
}

function renderWorksList() {
  document.getElementById('worksList').style.display = 'block';
  document.getElementById('editor').style.display = 'none';

  if (works.length === 0) {
    document.getElementById('worksList').innerHTML = '<div class="card"><p style="color:var(--muted);">Нет работ. Нажмите «+ Новая работа» чтобы добавить.</p></div>';
    return;
  }

  let html = '<div class="card" style="padding:0;">';
  works.forEach(w => {
    html += `
      <div class="work-card">
        <div class="preview">
          <img src="${w.images && w.images[0] ? w.images[0] : ''}" alt="${w.title}">
        </div>
        <div class="info">
          <h4>${w.title}</h4>
          <p><strong>${w.tag}</strong> — ${w.description}</p>
          <p style="font-size:.8rem;color:var(--dim);margin-top:4px;">${w.images ? w.images.length : 0} фото</p>
        </div>
        <div class="actions">
          <button class="btn btn-sm btn-ghost" onclick="editWork(${w.id})">Редактировать</button>
        </div>
      </div>
    `;
  });
  html += '</div>';
  document.getElementById('worksList').innerHTML = html;
}

function showEditor(work) {
  document.getElementById('worksList').style.display = 'none';
  document.getElementById('editor').style.display = 'block';
  document.getElementById('editorTitle').textContent = work ? 'Редактирование' : 'Новая работа';
  document.getElementById('workId').value = work ? work.id : '';
  document.getElementById('workTitle').value = work ? work.title : '';
  document.getElementById('workTag').value = work ? work.tag : '';
  document.getElementById('workDesc').value = work ? work.description : '';
  document.getElementById('deleteBtn').style.display = work ? 'inline-flex' : 'none';
  editingImages = work && work.images ? [...work.images] : [];
  renderImageList();
}

function renderImageList() {
  const el = document.getElementById('imageList');
  if (editingImages.length === 0) {
    el.innerHTML = '<p style="color:var(--dim);font-size:.85rem;">Нет изображений</p>';
    return;
  }
  el.innerHTML = '<div class="image-grid">' + editingImages.map((url, i) => `
    <div class="img-item">
      <img src="${url}" alt="img-${i}">
      <button type="button" class="remove" onclick="removeImage(${i})">×</button>
    </div>
  `).join('') + '</div>';
}

window.removeImage = function(index) {
  editingImages.splice(index, 1);
  renderImageList();
};

window.editWork = function(id) {
  const work = works.find(w => w.id === id);
  if (work) showEditor(work);
};

document.getElementById('addWorkBtn').addEventListener('click', () => showEditor(null));
document.getElementById('backToList').addEventListener('click', (e) => { e.preventDefault(); renderWorksList(); });
document.getElementById('cancelBtn').addEventListener('click', () => renderWorksList());

document.getElementById('addImageBtn').addEventListener('click', () => {
  const input = document.getElementById('newImageUrl');
  const url = input.value.trim();
  if (url) {
    editingImages.push(url);
    input.value = '';
    renderImageList();
  }
});

document.getElementById('newImageUrl').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('addImageBtn').click();
  }
});

document.getElementById('editorForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('workId').value;
  const data = {
    title: document.getElementById('workTitle').value,
    tag: document.getElementById('workTag').value,
    description: document.getElementById('workDesc').value,
    images: editingImages
  };

  try {
    const res = id
      ? await fetch(`/api/works/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
      : await fetch('/api/works', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });

    if (res.ok) {
      showToast(id ? 'Работа обновлена' : 'Работа добавлена');
      await loadWorks();
    } else {
      showToast('Ошибка сохранения', 'error');
    }
  } catch (err) {
    showToast('Ошибка сети', 'error');
  }
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
  const id = document.getElementById('workId').value;
  if (!id) return;
  if (!confirm('Удалить эту работу?')) return;

  try {
    const res = await fetch(`/api/works/${id}`, { method: 'DELETE' });
    if (res.ok) {
      showToast('Работа удалена');
      await loadWorks();
    } else {
      showToast('Ошибка удаления', 'error');
    }
  } catch (err) {
    showToast('Ошибка сети', 'error');
  }
});

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/admin/login.html';
});

async function init() {
  await checkAuth();
  await loadWorks();

  const params = new URLSearchParams(window.location.search);
  const editId = params.get('edit');
  if (editId) {
    const work = works.find(w => w.id === Number(editId));
    if (work) editWork(work.id);
  }
}
init();
</script>
</body>
</html>
